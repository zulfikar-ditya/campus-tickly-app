# version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.12
    container_name: elysia-clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-app}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-app}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-secret}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      # - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      # - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      # - ./infra/clickhouse/init-scripts:/docker-entrypoint-initdb.d
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - app_network

  postgres:
    image: postgres:18.1
    container_name: elysia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-elysia_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: elysia-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "${REDIS_PASSWORD:-password123}" ping | grep PONG',
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build:
      context: .
      target: release
    container_name: elysia-app
    restart: unless-stopped
    # All app config comes from .env (compose also reads it for ${VAR}
    # interpolation above). Inside the compose network use service hostnames:
    #   DATABASE_URL=postgres://<user>:<pass>@postgres:5432/<db>
    #   REDIS_HOST=redis, CLICKHOUSE_HOST=http://clickhouse:8123
    # Scaling: APP_CLUSTER_MODE=true (one container, all cores) — or
    # APP_REUSE_PORT=true if you scale via `docker compose up --scale app=N`.
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

networks:
  app_network:
    driver: bridge
